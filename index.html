<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f4c81">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="OpenDoor Pass">
  <link rel="apple-touch-icon" href="./assets/icons/icon.svg">
  <title>OpenDoor Pass</title>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const centreId = params.get("centre_id");
      if (!centreId) return;
      const currentPath = window.location.pathname.replace(/\/+$/, "");
      if (currentPath.endsWith("/centre/" + centreId)) return;
      const targetUrl = new URL("./centre/" + encodeURIComponent(centreId) + "/", window.location.href);
      targetUrl.search = window.location.search;
      window.location.replace(targetUrl.toString());
    }());
  </script>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <main class="shell" aria-live="polite">
    <img src="./assets/centre-logo.png" alt="Centre logo" class="centre-logo">

    <div class="qr-wrap">
      <canvas id="pass-qr" width="280" height="280" aria-label="Family login QR code"></canvas>
    </div>

    <p id="family-name" class="family-line">Family</p>
    <p id="family-id" class="id-line">ID: --</p>

    <img src="./assets/opendoor-logo.png" alt="OpenDoor" class="opendoor-logo">
  </main>

  <script src="./assets/vendor/qrcode.js" defer></script>
  <script src="./install_messages.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
